server {
    server_name priceklick.com www.priceklick.com 15.222.243.251 ec2-15-222-243-251.ca-central-1.compute.amazonaws.com;

    root /home/ubuntu/price_klick-/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 20M;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/priceklick.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/priceklick.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = www.priceklick.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = priceklick.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name priceklick.com www.priceklick.com 15.222.243.251 ec2-15-222-243-251.ca-central-1.compute.amazonaws.com;
    return 404;
}
